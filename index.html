<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Data Operasional (Online Real-time)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // =================================================================
        // KONFIGURASI FIREBASE ALAMAT ASLI (DATA LAMA DIJAMIN MUNCUL)
        // =================================================================
        const firebaseConfig = {
    apiKey: "AIzaSyColh0-AXgzBs_qIyIX7vj9C7As2KsEQRs",
    authDomain: "teknisi-portal.firebaseapp.com",
    // Gunakan URL referensi standar yang disarankan oleh Firebase SDK untuk region Asia
    databaseURL: "https://teknisi-portal-default-rtdb.firebaseio.com", 
    projectId: "teknisi-portal",
    storageBucket: "teknisi-portal.firebasestorage.app",
    messagingSenderId: "535247512587",
    appId: "1:535247512587:web:499ccf9a6ae310d6c6930e"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Pasang ke global window agar script di bagian bawah file bisa mengaksesnya
        window.dbFirebase = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbPush = push;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
        
        // Jalankan inisialisasi aplikasi cloud setelah DOM siap
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof initApp === 'function') {
                initApp();
            }
        });
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white flex flex-col justify-between hidden md:flex">
            <div class="p-5">
                <h1 class="text-xl font-bold tracking-wider text-cyan-400 mb-8">
                    <i class="fa-solid fa-screwdriver-wrench mr-2"></i>Teknisi Portal
                </h1>
                <nav class="space-y-2">
                    <button id="btn-services" onclick="switchTab('services')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i class="fa-solid fa-laptop-medical w-6 text-center"></i> <span>Log Services</span>
                    </button>
                    <button id="btn-penyewaan" onclick="switchTab('penyewaan')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i class="fa-solid fa-boxes-packing w-6 text-center"></i> <span>Penyewaan</span>
                    </button>
                    <button id="btn-cctv" onclick="switchTab('cctv')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i class="fa-solid fa-video w-6 text-center"></i> <span>Proyek CCTV</span>
                    </button>
                    <button id="btn-list_laptop" onclick="switchTab('list_laptop')" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                        <i class="fa-solid fa-laptop w-6 text-center"></i> <span>List Laptop</span>
                    </button>
                </nav>
            </div>
            <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
                V2.0 Cloud Operational System
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 flex justify-between items-center px-6 sticky top-0 z-10">
                <h2 id="page-title" class="text-xl font-bold text-slate-800">Menghubungkan ke Cloud...</h2>
                <div class="text-sm bg-slate-100 px-3 py-1.5 rounded-full text-slate-600 font-medium">
                    <i class="fa-regular fa-calendar mr-1"></i> <span id="current-date"></span>
                </div>
            </header>

            <main class="p-6 max-w-5xl w-full mx-auto space-y-6">
                
                <div class="bg-white rounded-xl shadow-sm border p-6">
                    <h3 class="text-lg font-semibold text-slate-700 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-pen-to-square text-cyan-600"></i> Form Input Data
                    </h3>
                    <form id="operational-form" onsubmit="handleSubmit(event)">
                        <div id="form-fields" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                        
                        <div class="mt-6 flex justify-end">
                            <button type="submit" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-2.5 rounded-lg font-medium shadow-sm transition flex items-center space-x-2">
                                <i class="fa-solid fa-cloud-arrow-up"></i> <span>Simpan Real-time</span>
                            </button>
                        </div>
                    </form>
                </div>

                <div class="bg-white rounded-xl shadow-sm border p-6 overflow-hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                        <h3 class="text-lg font-semibold text-slate-700 flex items-center gap-2">
                            <i class="fa-solid fa-list-check text-cyan-600"></i> Data Terinput (Cloud)
                        </h3>
                        <div class="relative w-full sm:w-64">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3.5 text-gray-400 text-sm"></i>
                            <input type="text" id="search-bar" oninput="renderTable()" placeholder="Cari data..." class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                        </div>
                    </div>

                    <div class="overflow-x-auto border rounded-lg">
                        <table class="w-full text-left border-collapse">
                            <thead id="table-head" class="bg-slate-50 text-slate-600 text-sm font-semibold uppercase tracking-wider border-b">
                            </thead>
                            <tbody id="table-body" class="divide-y text-sm text-gray-700 bg-white">
                                <tr><td class="px-4 py-8 text-center text-gray-400">Menghubungkan ke server Firebase...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="toast" class="hidden fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-lg shadow-lg flex items-center space-x-3 transition duration-300 z-50">
                    <i class="fa-solid fa-circle-check text-xl"></i>
                    <span>Data berhasil disimpan online di Database Cloud!</span>
                </div>

            </main>
        </div>
    </div>

    <script>
        let currentTab = 'services';
        let globalDataCloud = {
            services: [],
            penyewaan: [],
            cctv: [],
            list_laptop: []
        }; 

        // Set Tanggal Hari Ini di Header
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        const fieldsTemplate = {
            services: `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pelanggan</label>
                    <input type="text" name="pelanggan" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Perangkat (Laptop/PC/dll)</label>
                    <input type="text" name="perangkat" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gejala / Kerusakan</label>
                    <textarea name="kerusakan" rows="2" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estimasi Biaya (Rp)</label>
                    <input type="number" name="biaya" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                        <option value="Antrean">Antrean</option>
                        <option value="Proses">Proses Pengecekan</option>
                        <option value="Selesai">Selesai</option>
                    </select>
                </div>
            `,
            penyewaan: `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Penyewa</label>
                    <input type="text" name="penyewa" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Selesai Sewa</label>
                    <input type="date" name="tgl_selesai" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div class="md:col-span-2 space-y-1.5">
                    <label class="block text-sm font-medium text-gray-700">Pilih Unit Laptop yang Tersedia (Bisa Centang Banyak)</label>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400 text-xs"></i>
                        <input type="text" id="search-form-laptop" oninput="populateLaptopCheckboxes()" placeholder="Ketik Merk, Tipe, atau SN untuk mencari..." class="w-full pl-8 pr-4 py-1.5 border border-gray-300 rounded-lg text-xs focus:ring-1 focus:ring-cyan-500 focus:outline-none bg-slate-50">
                    </div>
                    <div id="checkbox-laptop-container" class="border border-gray-300 rounded-xl p-3 max-h-52 overflow-y-auto bg-white space-y-2">
                        </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Total Biaya Sewa (Rp)</label>
                    <input type="number" name="total_biaya" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status Pembayaran</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                        <option value="Belum Bayar">Belum Bayar</option>
                        <option value="DP 50%">DP 50%</option>
                        <option value="Lunas">Lunas</option>
                    </select>
                </div>
            `,
            cctv: `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Klien / Instansi</label>
                    <input type="text" name="klien" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi Pemasangan</label>
                    <input type="text" name="lokasi" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jumlah Kamera CCTV</label>
                    <input type="number" name="jumlah_cctv" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Progres Kerja</label>
                    <input type="text" name="progres" value="Penarikan Kabel" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status Proyek</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                        <option value="Survei">Tahap Survei</option>
                        <option value="Pengerjaan">Sedang Dikerjakan</option>
                        <option value="Selesai">Selesai / Serah Terima</option>
                    </select>
                </div>
            `,
            list_laptop: `
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Brand / Merk Laptop</label>
                    <input type="text" name="merk" placeholder="Contoh: Lenovo, ASUS, Dell" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipe / Model Laptop</label>
                    <input type="text" name="tipe" placeholder="Contoh: ThinkPad T480, ROG G15" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Serial Number (SN) Unit</label>
                    <input type="text" name="sn" placeholder="Masukkan nomor SN unik" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Harga Sewa per Hari (Rp)</label>
                    <input type="number" name="harga_sewa" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Spesifikasi Singkat</label>
                    <input type="text" name="spek" placeholder="Contoh: Core i5 Gen 8 / RAM 8GB / SSD 256GB" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Status Ketersediaan</label>
                    <select name="status" class="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-cyan-500 focus:outline-none">
                        <option value="Tersedia">Ready / Tersedia</option>
                        <option value="Disewa">Sedang Disewa</option>
                        <option value="Maintenance">Perbaikan / Rusak</option>
                    </select>
                </div>
            `
        };

        const tableHeaders = {
            services: ['ID', 'Tanggal', 'Pelanggan', 'Perangkat', 'Kerusakan', 'Biaya', 'Status', 'Aksi'],
            penyewaan: ['ID', 'Tanggal', 'Penyewa', 'Unit & SN Laptop', 'Tgl Selesai', 'Total Biaya', 'Status', 'Aksi'],
            cctv: ['ID', 'Tanggal', 'Klien', 'Lokasi', 'Kamera', 'Progres', 'Status', 'Aksi'],
            list_laptop: ['ID', 'Tanggal Input', 'Merk', 'Tipe', 'Serial Number (SN)', 'Spesifikasi', 'Harga/Hari', 'Status', 'Aksi']
        };

        const dataKeysMapping = {
            services: ['id', 'tanggal', 'pelanggan', 'perangkat', 'kerusakan', 'biaya', 'status'],
            penyewaan: ['id', 'tanggal', 'penyewa', 'unit', 'tgl_selesai', 'total_biaya', 'status'],
            cctv: ['id', 'tanggal', 'klien', 'lokasi', 'jumlah_cctv', 'progres', 'status'],
            list_laptop: ['id', 'tanggal', 'merk', 'tipe', 'sn', 'spek', 'harga_sewa', 'status']
        };

        function initApp() {
            switchTab('services');

            const nodes = ['services', 'penyewaan', 'cctv', 'list_laptop'];
            nodes.forEach(node => {
                if (!window.dbFirebase) return;
                const nodeRef = window.dbRef(window.dbFirebase, node);
                window.dbOnValue(nodeRef, (snapshot) => {
                    const value = snapshot.val();
                    globalDataCloud[node] = value ? Object.keys(value).map(key => ({ _firebaseKey: key, ...value[key] })) : [];
                    
                    if (currentTab === node) {
                        renderTable();
                    }
                    if (node === 'list_laptop' && currentTab === 'penyewaan') {
                        populateLaptopCheckboxes();
                    }
                });
            });
        }

        function switchTab(tabName) {
            currentTab = tabName;
            const titles = { 
                services: "Input Log Services", 
                penyewaan: "Input Data Penyewaan", 
                cctv: "Input Proyek CCTV Pemasangan",
                list_laptop: "Manajemen Unit Laptop yang Disewakan (Master Data)"
            };
            
            document.getElementById('page-title').innerText = titles[tabName];
            document.getElementById('form-fields').innerHTML = fieldsTemplate[tabName];
            document.getElementById('search-bar').value = ''; 
            
            ['services', 'penyewaan', 'cctv', 'list_laptop'].forEach(tab => {
                const btn = document.getElementById(`btn-${tab}`);
                if(btn) {
                    if(tab === tabName) {
                        btn.className = "w-full flex items-center space-x-3 px-4 py-3 rounded-lg bg-slate-800 text-cyan-400 font-medium transition";
                    } else {
                        btn.className = "w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition";
                    }
                }
            });

            renderTableHeader();
            renderTable();

            if(tabName === 'penyewaan') {
                populateLaptopCheckboxes();
            }
        }

        function renderTableHeader() {
            const head = document.getElementById('table-head');
            if(!head) return;
            let html = '<tr>';
            tableHeaders[currentTab].forEach(header => {
                html += `<th class="px-4 py-3 font-semibold">${header}</th>`;
            });
            html += '</tr>';
            head.innerHTML = html;
        }

        // PERBAIKAN & PENAMBAHAN: Fungsi render checkbox sekarang mendukung filter ketik (Search Bar)
        function populateLaptopCheckboxes() {
            const container = document.getElementById('checkbox-laptop-container');
            if(!container) return;

            const masterLaptop = globalDataCloud['list_laptop'] || [];
            if(masterLaptop.length === 0) {
                container.innerHTML = `<span class="text-xs text-gray-400 italic">Tidak ada laptop di gudang (Isi di menu List Laptop)</span>`;
                return;
            }

            // Ambil query pencarian form jika kolom input pencariannya ada
            const searchInput = document.getElementById('search-form-laptop');
            const searchQuery = searchInput ? searchInput.value.toLowerCase() : '';

            // Filter data secara case-insensitive
            const filteredLaptop = masterLaptop.filter(lap => {
                const brand = (lap.merk || '').toLowerCase();
                const type = (lap.tipe || '').toLowerCase();
                const sn = (lap.sn || '').toLowerCase();
                const spec = (lap.spek || '').toLowerCase();
                return brand.includes(searchQuery) || type.includes(searchQuery) || sn.includes(searchQuery) || spec.includes(searchQuery);
            });

            if(filteredLaptop.length === 0) {
                container.innerHTML = `<span class="text-xs text-gray-400 italic block py-2 text-center">Unit laptop tidak ditemukan.</span>`;
                return;
            }

            let html = '';
            filteredLaptop.forEach((lap) => {
                const snText = lap.sn ? lap.sn : 'Tanpa SN';
                const infoText = `${lap.merk} ${lap.tipe} [SN: ${snText}]`;
                const isDisabled = lap.status !== 'Tersedia';
                
                html += `
                    <label class="flex items-start space-x-3 p-1.5 hover:bg-slate-50 rounded-lg transition text-sm ${isDisabled ? 'text-gray-400 bg-gray-50' : 'cursor-pointer'}">
                        <input type="checkbox" name="selected_laptops" value="${infoText}" data-key="${lap._firebaseKey}" ${isDisabled ? 'disabled' : ''} class="mt-1 rounded text-cyan-600 focus:ring-cyan-500 border-gray-300 disabled:bg-gray-200">
                        <div>
                            <span class="font-semibold text-slate-800">${lap.merk} ${lap.tipe}</span>
                            <span class="block text-xs text-gray-500">SN: <span class="font-mono text-cyan-600 font-medium">${snText}</span> | ${lap.spek}</span>
                            ${isDisabled ? `<span class="text-[10px] bg-rose-100 text-rose-800 px-1.5 py-0.2 rounded font-semibold mt-0.5 inline-block">${lap.status}</span>` : ''}
                        </div>
                    </label>
                `;
            });
            container.innerHTML = html;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            if(!tbody) return;

            const data = globalDataCloud[currentTab] || [];
            const searchQuery = document.getElementById('search-bar').value.toLowerCase();
            tbody.innerHTML = '';

            const filteredData = data.filter(item => {
                return Object.values(item).some(val => {
                    if (typeof val === 'object') return false;
                    return String(val).toLowerCase().includes(searchQuery);
                });
            });

            if(filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${tableHeaders[currentTab].length}" class="px-4 py-8 text-center text-gray-400 bg-gray-50 font-medium"><i class="fa-solid fa-folder-open text-xl block mb-2"></i>Belum ada data tersedia di cloud</td></tr>`;
                return;
            }

            filteredData.forEach((item) => {
                let rowHtml = `<tr class="hover:bg-slate-50 transition border-b">`;
                const keysOrder = dataKeysMapping[currentTab];
                
                keysOrder.forEach((key) => {
                    const val = item[key] !== undefined ? item[key] : '-';
                    
                    if (key === 'biaya' || key === 'total_biaya' || key === 'harga_sewa') {
                        rowHtml += `<td class="px-4 py-3 font-medium text-slate-900">Rp ${Number(val).toLocaleString('id-ID')}</td>`;
                    } else if (key === 'status') { 
                        let badgeColor = "bg-amber-100 text-amber-800";
                        if (val === 'Selesai' || val === 'Lunas' || val === 'Tersedia') badgeColor = "bg-emerald-100 text-emerald-800";
                        if (val === 'Belum Bayar' || val === 'Maintenance') badgeColor = "bg-rose-100 text-rose-800";
                        if (val === 'Dis
